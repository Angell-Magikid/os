<link rel="stylesheet" href="style.css">

<body>
<!-- Login Screen -->
<div id="loginScreen" class="ls">
    <div class="lb">
        <div class="lh">
            <h1>MagiKid OS</h1>
            <p id="loginSubtitle">AI Era · Smart Collaboration</p>
        </div>
        <form class="lf" onsubmit="handleLogin(event)">
            <div class="ig">
                <label id="lblSelect">Select Account</label>
                <select id="loginSelect" required><option value="">Choose...</option></select>
            </div>
            <div class="ig">
                <label id="lblPassword">Password (Name + 2026)</label>
                <input type="password" id="loginPassword" placeholder="e.g.: angell2026" required>
            </div>
            <button type="submit" class="lbtn" id="btnLogin">Enter System</button>
        </form>
        <div class="ulist">
            <h4 id="lblQuick">Quick Login (Click to fill)</h4>
            <div class="uchips" id="userChips"></div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="app" class="app">
    <header class="hdr">
        <div class="hl">
            <div class="logo">MagiKid OS</div>
            <nav class="nav">
                <div class="ni ac" data-page="dashboard" data-i18n="nav.dashboard">总览</div>
                <div class="ni" data-page="projects" data-i18n="nav.projects">项目</div>
                <div class="ni" data-page="myprojects" data-i18n="nav.myprojects">我的项目</div>
                <div class="ni" data-page="team" data-i18n="nav.team">团队</div>
                <div class="ni" data-page="ai" data-i18n="nav.ai">AI分析</div>
                <div class="ni" data-page="reports" data-i18n="nav.reports">报告</div>
                <div class="ni" data-page="graph" data-i18n="nav.graph">图谱</div>
            </nav>
        </div>
        <div class="hr">
            <select id="langSwitch" class="lang-select" onchange="switchLanguage(this.value)">
                <option value="en">EN</option>
                <option value="zh">中文</option>
            </select>
            <div class="ui" onclick="showProfile()">
                <div class="ua" id="headerAvatar">A</div>
                <div><div class="un" id="headerName">Angell</div><div class="ur" id="headerRole">CEO</div></div>
            </div>
            <button class="btn btn-s btn-sm" onclick="handleLogout()" id="btnLogout">退出</button>
        </div>
    </header>

    <main class="main">
        <!-- Dashboard -->
        <div id="page-dashboard" class="pg ac">
            <div class="ph">
                <div><h1 class="pt" id="dashTitle">公司运营总览</h1><p class="ps" id="dashDate"></p></div>
                <div class="gap8" id="ceoActions" style="display:none">
                    <button class="btn btn-p" onclick="showModal('newProject')" id="btnNewProj">+ 新建项目</button>
                    <button class="btn btn-s" onclick="resetSampleData()" title="重置示例数据">🔄 重置数据</button>
                </div>
            </div>
            <div class="sg" id="dashboardStats"></div>
            <div class="cd">
                <div class="ch"><div class="ct" id="dashGlobal">公司全局视图</div></div>
                <div id="dashboardContent"></div>
            </div>
        </div>

        <!-- Projects (All) -->
        <div id="page-projects" class="pg">
            <div class="ph">
                <div><h1 class="pt" id="projTitle">全部项目</h1><p class="ps" id="projSubtitle">查看和管理所有项目</p></div>
                <div class="gap8">
                    <select class="fi" style="width:auto;padding:9px 14px" id="filterStatus" onchange="renderProjects()">
                        <option value="" data-i18n="filter.all">全部状态</option>
                        <option value="pending" data-i18n="filter.pending">待开始</option>
                        <option value="in-progress" data-i18n="filter.inprogress">进行中</option>
                        <option value="review" data-i18n="filter.review">审核中</option>
                        <option value="completed" data-i18n="filter.completed">已完成</option>
                    </select>
                    <button class="btn btn-p" onclick="showModal('newProject')">+ 新建项目</button>
                </div>
            </div>
            <div id="projectsList"></div>
        </div>

        <!-- My Projects -->
        <div id="page-myprojects" class="pg">
            <div class="ph">
                <div><h1 class="pt" id="myTitle">我的项目</h1><p class="ps" id="mySubtitle">我参与或负责的项目</p></div>
                <button class="btn btn-p" onclick="showModal('newProject')">+ 新建项目</button>
            </div>
            <div id="myProjectsList"></div>
        </div>

        <!-- Team -->
        <div id="page-team" class="pg">
            <div class="ph">
                <div><h1 class="pt" id="teamTitle">团队成员</h1><p class="ps" id="teamSubtitle">16人核心团队 · HR档案</p></div>
            </div>
            <div class="cd">
                <div class="ch"><div class="ct" id="deptFilter">按Group筛选</div>
                    <select class="fi" style="width:auto;padding:7px 12px" id="filterDept" onchange="renderTeam()">
                        <option value="">全部成员</option>
                        <option value="ungrouped">Other</option>
                        <option value="curriculum">课程相关</option>
                        <option value="tech">技术相关</option>
                        <option value="admin">管理相关</option>
                        <option value="media">Media相关</option>
                        <option value="lab">Lab沟通</option>
                        <option value="finance">财务相关</option>
                        <option value="legal">法律相关</option>
                    </select>
                </div>
                <div class="tg" id="teamGrid" style="margin-top:16px"></div>
            </div>
        </div>

        <!-- AI Analytics -->
        <div id="page-ai" class="pg">
            <div class="ph">
                <div><h1 class="pt" id="aiTitle">AI参与分析</h1><p class="ps" id="aiSubtitle">人机协作效率追踪</p></div>
                <button class="btn btn-s" onclick="renderAI()">刷新</button>
            </div>
            <div class="sg" id="aiStats"></div>
            <div class="cd">
                <div class="ch"><div class="ct" id="aiChartTitle">各项目AI参与度</div></div>
                <div id="aiProjectChart" style="padding:16px 0"></div>
            </div>
            <div class="cd" style="margin-top:14px">
                <div class="ch"><div class="ct" id="aiRankTitle">团队AI使用排名</div></div>
                <div id="aiRankChart" style="padding:16px 0"></div>
            </div>
        </div>

        <!-- Reports -->
        <div id="page-reports" class="pg">
            <div class="ph">
                <div><h1 class="pt" id="reportTitle" data-i18n="report.title">报告中心</h1><p class="ps" id="reportSubtitle" data-i18n="report.subtitle">自动生成 · 随时查阅</p></div>
                <div class="gap8">
                    <button class="btn btn-s" onclick="generateReport('weekly')" id="btnWeekly" data-i18n="report.weekly">生成周报</button>
                    <button class="btn btn-p" onclick="generateReport('project')" id="btnProjReport" data-i18n="report.project">生成项目报告</button>
                </div>
            </div>
            <div id="reportPreview"></div>
        </div>

        <!-- Graph -->
        <div id="page-graph" class="pg">
            <div class="ph">
                <div><h1 class="pt" id="graphTitle" data-i18n="graph.title">关系图谱</h1><p class="ps" id="graphSubtitle" data-i18n="graph.subtitle">项目人员实时协作网络</p></div>
                <select class="fi" style="width:auto;padding:9px 14px" id="graphProject" onchange="renderGraph()">
                    <option value="" id="graphAllOpt" data-i18n="graph.all">所有进行中项目</option>
                </select>
            </div>
            <div class="gc">
                <div class="gleg" id="graphLegend">
                    <div class="gli"><div class="gd"></div><span id="legMember" data-i18n="leg.member">团队成员</span></div>
                    <div class="gli"><div class="gd a"></div><span id="legProject" data-i18n="leg.project">项目</span></div>
                    <div class="gli"><div class="gd s"></div><span id="legOwner" data-i18n="leg.owner">负责人</span></div>
                </div>
                <div class="gr" id="relationshipGraph"></div>
            </div>
        </div>
    </main>
</div>

<!-- Modal -->
<div class="mo" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="m" id="modalContent"></div>
</div>

let DB={users:[...USERS],projects:[...SAMPLE_PROJECTS],activities:[],settings:{maxDuration:30}};
let useFirebase = false;
let currentUserId = null;

function initDB(){
    // Always ensure USERS are in DB first
    DB.users = [...USERS];
    
    // Check if Firebase is available and configured
    if (typeof firebase !== 'undefined' && typeof DB_FIREBASE !== 'undefined' && DB_FIREBASE !== null && firebase.apps.length > 0) {
        try {
            useFirebase = true;
            syncFromCloud();
            // Listen for real-time updates
            DB_FIREBASE.ref('magikidOS').on('value', (snapshot) => {
                if (snapshot.val()) {
                    const cloudData = snapshot.val();
                    DB.projects = cloudData.projects || [];
                    DB.activities = cloudData.activities || [];
                    DB.settings = cloudData.settings || {maxDuration:30};
                    localStorage.setItem('magikidOS_v2', JSON.stringify(DB));
                    // Re-render if on dashboard/graph
                    if(document.getElementById('page-dashboard')?.classList.contains('ac')) renderDashboard();
                    if(document.getElementById('page-projects')?.classList.contains('ac')) renderProjects();
                    if(document.getElementById('page-myprojects')?.classList.contains('ac')) renderMyProjects();
                    if(document.getElementById('page-graph')?.classList.contains('ac')) renderGraph();
                }
            });
            console.log('☁️ Using Firebase Cloud Database');
        } catch(e) {
            console.log('⚠️ Firebase error:', e);
            useLocalStorage();
        }
    } else {
        useLocalStorage();
    }
}

function useLocalStorage() {
    useFirebase = false;
    const s=localStorage.getItem('magikidOS_v2');
    if(s){try{
        const parsed=JSON.parse(s);
        // Only use stored data if it has actual projects
        if(parsed.projects && parsed.projects.length > 0) {
            DB=parsed;
        } else {
            // No projects in storage, use sample
            DB.projects=[...SAMPLE_PROJECTS];
            console.log('📋 Loaded sample projects (storage empty)');
        }
    }catch(e){DB.projects=[...SAMPLE_PROJECTS];}}
    // Ensure all USERS exist
    USERS.forEach(u=>{if(!DB.users.find(x=>x.login===u.login))DB.users.push(u);});
    saveDB();
    console.log('💾 Using Local Storage, Projects: ' + DB.projects.length);
}

function resetSampleData() {
    if(SAMPLE_PROJECTS) {
        DB.projects = [...SAMPLE_PROJECTS];
        saveDB();
        alert('✅ 已重置！加载了 ' + DB.projects.length + ' 个示例项目。刷新页面后点击"项目"查看。');
        renderDashboard();
    }
}

function syncToCloud() {
    if (useFirebase) {
        DB_FIREBASE.ref('magikidOS').update({
            projects: DB.projects,
            activities: DB.activities,
            settings: DB.settings,
            lastUpdate: firebase.database.ServerValue.TIMESTAMP
        });
    }
}

function syncFromCloud() {
    if (useFirebase) {
        DB_FIREBASE.ref('magikidOS').once('value').then((snapshot) => {
            if (snapshot.val()) {
                const cloudData = snapshot.val();
                DB.projects = cloudData.projects || [];
                DB.activities = cloudData.activities || [];
                DB.settings = cloudData.settings || {maxDuration:30};
                localStorage.setItem('magikidOS_v2', JSON.stringify(DB));
            }
        });
    }
}

function saveDB(){
    localStorage.setItem('magikidOS_v2',JSON.stringify(DB));
    syncToCloud();
}
function getUser(){const u=localStorage.getItem('magikidOS_v2_user');return u?DB.users.find(x=>x.id===parseInt(u)):null;}
function genId(){return Date.now().toString(36)+Math.random().toString(36).substr(2);}
function fmt(d){return new Date(d).toLocaleDateString(currentLang==='zh'?'zh-CN':'en-US',{month:'short',day:'numeric',year:'numeric'});}
function daysAgo(d){
    const days = Math.ceil((Date.now()-new Date(d))/(864e5));
    if (days === 0) return t('today');
    if (days === 1) return t('yesterday');
    return days + ' ' + t('days.ago');
}
function daysLeft(d){return Math.ceil((new Date(d)-Date.now())/(864e5));}

function addActivity(type,text){
    const u=getUser();
    DB.activities.unshift({id:genId(),type,text,userId:u?.id,time:new Date().toISOString()});
    if(DB.activities.length>100)DB.activities.pop();
    saveDB();
}

// ==================== Projects ====================
function calcScore(p){
    const scoreMap={critial:4,high:3,medium:2,low:1};
    const important=scoreMap[p.important]||2;
    const urgent=scoreMap[p.urgent]||2;
    const diff=scoreMap[p.difficulty]||2;
    const revenue=scoreMap[p.revenue]||2;
    return important*3+urgent*2+diff*2+revenue*1;
}

function renderProjects(){
    const filter=document.getElementById('filterStatus').value;
    let list=[...DB.projects];
    if(filter)list=list.filter(p=>p.status===filter);
    list.sort((a,b)=>calcScore(b)-calcScore(a));
    const u=getUser();
    
    document.getElementById('projTitle').textContent = t('proj.title');
    document.getElementById('projSubtitle').textContent = t('proj.subtitle');
    
    document.getElementById('projectsList').innerHTML=list.length?list.map(p=>renderProjectCard(p,u)).join(''):'<div class="empty">'+t('proj.empty')+'</div>';
}

    const statusBg={pending:'bg-a','in-progress':'bg-p',review:'bg-pu',completed:'bg-s'}[p.status]||'bg-p';

    const scoreClass={critial:'score-h',high:'score-h',medium:'score-m',low:'score-l'}[p.important]||'score-m';

        important: {critial: currentLang==='zh'?'极重要':'Critical', high: currentLang==='zh'?'重要':'High', medium: currentLang==='zh'?'一般':'Medium', low: currentLang==='zh'?'低':'Low'},

        difficulty: {high: currentLang==='zh'?'高难':'Hard', medium: currentLang==='zh'?'中难':'Medium', low: currentLang==='zh'?'低难':'Easy'},
        revenue: {high: currentLang==='zh'?'高收':'High', medium: currentLang==='zh'?'中收':'Medium', low: currentLang==='zh'?'低收':'Low'},

    tags.push(`<span class="ptag ptag-${p.important[0]==='c'?'im':p.important[0]==='h'?'iu':p.important[0]==='m'?'in':'in'}">${tagConfig.important[p.important]||p.important}</span>`);

function handleMediaUpload(input){
    const preview=document.getElementById('mediaPreview');
    if(!preview)return;
    preview.innerHTML='';
    Array.from(input.files).forEach(f=>{
        if(f.type.startsWith('image/')){
            const reader=new FileReader();
            reader.onload=e=>preview.innerHTML+=`<img src="${e.target.result}" class="img-thumb" onclick="window.open('${e.target.result}','_blank')">`;
            reader.readAsDataURL(f);
        }
    });
}

function addLink(id){
    const p=DB.projects.find(x=>x.id===id);
    if(!p)return;
    const link=document.getElementById('newLink').value;
    if(!link)return;
    p.links=p.links||[];
    p.links.push(link);
    saveDB();
    document.getElementById('newLink').value='';
    document.getElementById('linkList').innerHTML=p.links.map(l=>`<div class="link-item">🔗 <a href="${l}" target="_blank">${l}</a></div>`).join('');
}

function saveProgress(pid){
    const p=DB.projects.find(x=>x.id===pid);
    if(!p)return;
    const u=getUser();
    const isCEO = u.id === 1;
    
    // CEO 顶级权限：可修改项目名称和成员
    if (isCEO) {
        // 修改项目名称
        const newName = document.getElementById('editProjName')?.value?.trim();
        if (newName && newName !== p.name) {
            const oldName = p.name;
            p.name = newName;
            const renameText = currentLang==='zh' ? `重命名项目「${oldName}」→「${p.name}」` : `Renamed project "${oldName}" → "${p.name}"`;
            addActivity('update', renameText);
        }
        
        // 修改成员
        const selectedMembers = Array.from(document.querySelectorAll('.ceo-member:checked')).map(cb => parseInt(cb.value));
        if (JSON.stringify(selectedMembers.sort()) !== JSON.stringify((p.members||[]).sort())) {
            p.members = selectedMembers;
            const memberText = currentLang==='zh' ? `调整「${p.name}」成员` : `Adjusted members for "${p.name}"`;
            addActivity('update', memberText);
        }
    }
    
    p.progress=parseInt(document.getElementById('progSlider').value);
    p.humanHours=parseInt(document.getElementById('humanH').value)||0;
    p.aiHours=parseInt(document.getElementById('aiH').value)||0;
    
    // Save weight matrix (CEO only)
    if(u.role==='CEO'){
        p.important=document.getElementById('editImportant').value;
        p.urgent=document.getElementById('editUrgent').value;
        p.difficulty=document.getElementById('editDifficulty').value;
        p.revenue=document.getElementById('editRevenue').value;
        p.stakeholder=document.getElementById('editStakeholder').value;
    }
    
    const note=document.getElementById('progNote').value;
    if(note){
        p.logs=p.logs||[];
        p.logs.unshift(`[${fmt(new Date())}] ${getUser()?.name}: ${note}`);
    }
    saveDB();
    const actionText = currentLang==='zh' ? `更新「${p.name}」进展: ${p.progress}%` : `Updated "${p.name}" progress: ${p.progress}%`;
    addActivity('update',actionText);
    closeModal();
    renderProjects();
    renderMyProjects();
    renderDashboard();
    renderGraph();
}

function markComplete(id){
    const p=DB.projects.find(x=>x.id===id);
    if(p){
        p.status='completed';
        p.progress=100;
        p.completedAt=new Date().toISOString();
        saveDB();
        const actionText = currentLang==='zh' ? `完成项目「${p.name}」` : `Completed project "${p.name}"`;
        addActivity('complete',actionText);
        closeModal();
        renderProjects();
        renderMyProjects();
        renderDashboard();
    }
}

function showMemberDetail(id){
    const u=DB.users.find(x=>x.id===id);
    if(!u)return;
    const owned=DB.projects.filter(p=>p.owner===u.id);
    const joined=DB.projects.filter(p=>(p.members||[]).includes(u.id)&&p.owner!==u.id);
    
    // 计算协作关系紧密度
    const collabMap = {};
    [...owned, ...joined].forEach(p => {
        const people = [p.owner, ...(p.members||[])];
        people.forEach(pid => {
            if(pid && pid !== u.id) {
                collabMap[pid] = (collabMap[pid] || 0) + 1;
            }
        });
    });
    const collaborators = Object.entries(collabMap)
        .map(([pid, count]) => ({user: DB.users.find(x=>x.id===parseInt(pid)), count}))
        .filter(c => c.user)
        .sort((a, b) => b.count - a.count);
    
    // 合并所有项目并按状态/进度排序
    const allProjects = [...owned.map(p => ({...p, isOwned: true})), ...joined.map(p => ({...p, isOwned: false}))];
    // 按完成度排序: 进行中 > 待开始 > 审核中 > 已完成
    const statusOrder = {'in-progress': 0, 'pending': 1, 'review': 2, 'completed': 3};
    allProjects.sort((a, b) => {
        const orderDiff = (statusOrder[a.status] || 0) - (statusOrder[b.status] || 0);
        if (orderDiff !== 0) return orderDiff;
        return (b.progress || 0) - (a.progress || 0);
    });
    
    // 部门颜色
    const DEPT_COLORS = {
        'Executive': '#ffd700', 'Technology': '#3b82f6', 'Administration': '#10b981',
        'Design': '#ec4899', 'Finance': '#8b5cf6', 'Development': '#06b6d4',
        'Media': '#f97316', 'Curriculum': '#84cc16'
    };
    const deptColor = DEPT_COLORS[u.dept] || '#64748b';

function renderAI(){
    document.getElementById('aiTitle').textContent = t('ai.title');
    document.getElementById('aiSubtitle').textContent = t('ai.subtitle');
    document.getElementById('aiChartTitle').textContent = t('ai.chart');
    document.getElementById('aiRankTitle').textContent = t('ai.rank');
    
    let tH=0,tA=0;
    DB.projects.forEach(p=>{tH+=p.humanHours||0;tA+=p.aiHours||0;});

    const aiPct=total>0?Math.round(tA/total*100):0;
    
    document.getElementById('aiStats').innerHTML=`
        <div class="sc"><div class="sl">${t('ai.hours')}</div><div class="sv">${tA}h</div></div>
        <div class="sc"><div class="sl">${t('ai.human')}</div><div class="sv">${tH}h</div></div>
        <div class="sc"><div class="sl">${t('ai.rate')}</div><div class="sv">${aiPct}%</div></div>
        <div class="sc"><div class="sl">${t('ai.projects')}</div><div class="sv">${DB.projects.filter(p=>p.aiHours>0).length}</div></div>
    `;
    
    // Project chart
    const aiProjects=DB.projects.filter(p=>p.aiHours>0||p.humanHours>0).slice(0,6);
    document.getElementById('aiProjectChart').innerHTML=aiProjects.length?aiProjects.map(p=>{
        const tot=(p.humanHours||0)+(p.aiHours||0);
        const pct=tot>0?Math.round((p.aiHours||0)/tot*100):0;
        return `<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span>${p.name}</span><span>AI ${pct}%</span></div><div class="ar"><div class="arai" style="flex:${pct} 0 0%"></div><div class="arh" style="flex:${100-pct} 0 0%"></div></div></div>`;
    }).join(''):'<div class="empty">'+t('ai.empty')+'</div>';
    
    // Rank
    const stats=DB.users.map(u=>{
        const projs=DB.projects.filter(p=>p.owner===u.id||(p.members||[]).includes(u.id));
        let h=0,a=0;projs.forEach(p=>{h+=p.humanHours||0;a+=p.aiHours||0;});
        return{user:u,aiH:a,total:h+a};
    }).filter(x=>x.total>0).sort((a,b)=>b.aiH-a.aiH).slice(0,5);
    
    document.getElementById('aiRankChart').innerHTML=stats.length?stats.map((s,i)=>`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${i+1}. ${s.user.name}</span><span>${s.aiH}h</span></div><div style="height:6px;background:var(--bg);border-radius:3px"><div style="height:100%;width:${s.total>0?s.aiH/s.total*100:0}%;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:3px"></div></div></div>`).join(''):'<div class="empty">'+t('ai.empty')+'</div>';
}

// 部门颜色映射
const DEPT_COLORS = {
    'Executive': '#ffd700',    // 金色
    'Technology': '#3b82f6',   // 蓝色
    'Administration': '#10b981', // 绿色
    'Design': '#ec4899',        // 粉色
    'Finance': '#8b5cf6',       // 紫色
    'Development': '#06b6d4',   // 青色
    'Media': '#f97316',         // 橙色
    'Curriculum': '#84cc16'    // 亮绿色
};

// 计算项目评分
function getProjectScore(p) {
    const scoreMap = {critial: 4, high: 3, medium: 2, low: 1};
    const important = scoreMap[p.important] || 2;
    const urgent = scoreMap[p.urgent] || 2;
    const diff = scoreMap[p.difficulty] || 2;
    const revenue = scoreMap[p.revenue] || 2;
    return important * 3 + urgent * 2 + diff * 2 + revenue * 1;
}

// 计算人员紧密度（连接数）
function getPersonCentrality(personId, connections) {
    return Object.keys(connections).filter(k => k.includes(`-${personId}`) || k.startsWith(`${personId}-`)).length;
}

// 进度颜色（红色->黄色->绿色）
function getProgressColor(progress) {
    if (progress >= 70) return '#22c55e'; // 绿色
    if (progress >= 40) return '#eab308'; // 黄色
    return '#ef4444'; // 红色
}

// 检查是否延期
function isOverdue(deadline) {
    return daysLeft(deadline) < 0;
}

                        <div style="width: 16px; height: 16px; border-radius: 50%; background: ${mColor}; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; color: #fff;">${m.name[0]}</div>
                        <span style="font-size: 11px;">${m.name}</span>
                    </div>
                `;
            });
            
            if (otherMembers.length > 6) {
                html += `<span style="font-size: 11px; color: var(--tm);">+${otherMembers.length - 6}</span>`;
            }
            
            html += `</div></div>`;
        });
        
        html += `</div></div>`;
        container.innerHTML = html;
        return;
    }
    
    // ========== 全局视图：统计 + 项目列表 + 图谱 ==========
    const statusMap = {pending:'bg-a','in-progress':'bg-p',review:'bg-pu',completed:'bg-s'};
    
    // 构建HTML内容
    let html = `
        <div style="padding: 16px 20px 0;">
            <!-- 统计卡片 -->
            <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 120px; background: linear-gradient(135deg, #3b82f6, #1d4ed8); border-radius: 10px; padding: 14px 16px; color: #fff; text-align: center;">
                    <div style="font-size: 24px; font-weight: 800;">${allProjects.length}</div>
                    <div style="font-size: 11px; opacity: 0.85;">${currentLang==='zh'?'总项目':'Total'}</div>
                </div>
                <div style="flex: 1; min-width: 120px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 10px; padding: 14px 16px; color: #fff; text-align: center;">
                    <div style="font-size: 24px; font-weight: 800;">${ownerCount}</div>
                    <div style="font-size: 11px; opacity: 0.85;">👑 ${currentLang==='zh'?'负责人':'Owner'}</div>
                </div>
                <div style="flex: 1; min-width: 120px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 10px; padding: 14px 16px; color: #fff; text-align: center;">
                    <div style="font-size: 24px; font-weight: 800;">${memberCount}</div>
                    <div style="font-size: 11px; opacity: 0.85;">👥 ${currentLang==='zh'?'成员':'Member'}</div>
                </div>
            </div>
            
            <!-- 项目列表 -->
            <div style="margin-bottom: 16px;">
                <div style="font-size: 14px; font-weight: 600; margin-bottom: 10px;">📋 ${currentLang==='zh'?'所有项目':'All Projects'} (${allProjects.length})</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 8px;">
    `;
    
    allProjects.forEach(p => {
        const owner = DB.users.find(u => u.id === p.owner);
        const statusBg = statusMap[p.status] || 'bg-p';
        const statusText = t('status.'+p.status);
        const isOwner = p.owner === currentUserId;
        const isMember = (p.members || []).includes(currentUserId);
        const roleTag = isOwner ? `<span style="font-size:10px;padding:1px 5px;background:#f59e0b22;color:#f59e0b;border-radius:4px;">👑</span>` : 
                         (isMember ? `<span style="font-size:10px;padding:1px 5px;background:#10b98122;color:#10b981;border-radius:4px;">👥</span>` : '');
        
        html += `
                    <div style="background: var(--bc); border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; cursor: pointer;" onclick="showProjectDetail('${p.id}')">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="font-size: 12px; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${p.name}</span>
                            <span class="bg ${statusBg}" style="font-size: 9px; margin-left: 6px;">${statusText}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 10px; color: var(--tm);">
                            <span>${owner ? owner.name : '-'}</span>
                            ${roleTag}
                        </div>
                    </div>
        `;
    });
    
    html += `
                </div>
            </div>
        </div>
    `;
    
    container.innerHTML = html;
}

// ==================== Manual Backup (CEO) ====================
function backupProjectsToCSV() {
    const u = getUser();
    if (!u || u.id !== 1) return; // 仅 CEO 可用
    
    const headers = [
        'ID', '项目名称', '负责人', '成员', '截止日期', '状态', '进度',
        '重要性', '紧急度', '难度', '收入相关性', '受益方', '评分',
        '人力工时', 'AI工时', 'AI占比', '创建时间', '完成时间'
    ];
    
    const rows = DB.projects.map(p => {
        const owner = DB.users.find(x => x.id === p.owner);
        const memberNames = (p.members || []).map(id => DB.users.find(x => x.id === id)?.name).filter(Boolean).join(';');
        const total = (p.humanHours || 0) + (p.aiHours || 0);
        const aiPct = total > 0 ? Math.round((p.aiHours || 0) / total * 100) : 0;
        
        return [
            p.id,
            `"${(p.name || '').replace(/"/g, '""')}"`,
            `"${owner?.name || 'Unknown'}"`,
            `"${memberNames}"`,
            p.deadline || '',
            p.status || '',
            `${p.progress || 0}%`,
            p.important || '',
            p.urgent || '',
            p.difficulty || '',
            p.revenue || '',
            p.stakeholder || '',
            calcScore(p),
            p.humanHours || 0,
            p.aiHours || 0,
            `${aiPct}%`,
            p.createdAt ? new Date(p.createdAt).toLocaleDateString() : '',
            p.completedAt ? new Date(p.completedAt).toLocaleDateString() : ''
        ].join(',');
    });
    
    const csv = [headers.join(','), ...rows].join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const date = new Date().toISOString().split('T')[0];
    a.href = url;
    a.download = `magikid-projects-${date}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    
    const msg = currentLang === 'zh' 
        ? `✅ 备份完成: magikid-projects-${date}.csv` 
        : `✅ Backup complete: magikid-projects-${date}.csv`;
    addActivity('backup', msg);
    console.log(msg);
}

// 手动触发备份按钮（CEO可见）
function showBackupButton() {
    const u = getUser();
    if (u && u.id === 1) {
        const btn = document.createElement('button');
        btn.className = 'btn btn-s';
        btn.style.marginLeft = '8px';
        btn.textContent = '💾 Backup CSV';
        btn.onclick = () => backupProjectsToCSV();
        document.querySelector('.hdr .hr').appendChild(btn);
    }
}

function init(){
    initDB();
    const sel=document.getElementById('loginSelect');
    sel.innerHTML=`<option value="">${t('login.choose')}</option>`+DB.users.map(u=>`<option value="${u.login}">${u.name} - ${u.role}</option>`).join('');

    // Set initial language
    document.getElementById('langSwitch').value = currentLang;
    updateUI();
    
    if(getUser())showApp();
    
    // Handle graph resize
    window.addEventListener('resize',()=>{if(document.getElementById('page-graph').classList.contains('ac'))renderGraph();});
    
    // 显示手动备份按钮 (CEO only)
    showBackupButton();
}
init();
